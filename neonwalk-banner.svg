<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="deepglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dropshadow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#00FF41" flood-opacity="0.6"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#000f00"/>
      <stop offset="100%" stop-color="#000800"/>
    </linearGradient>
    <linearGradient id="hfade" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00FF41" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#00FF41" stop-opacity="1"/>
      <stop offset="85%"  stop-color="#00FF41" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titlefade" x1="0" y1="0" x2="540" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00FF41"/>
      <stop offset="100%" stop-color="#39FF14"/>
    </linearGradient>
    <radialGradient id="glowpool" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00FF41" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" rx="8" fill="url(#bg)"/>
  <rect width="800" height="160" rx="8" fill="url(#glowpool)"/>

  <!-- Subtle grid -->
  <g stroke="#00FF41" stroke-width="0.5" opacity="0.06">
    <line x1="100" y1="0"   x2="100" y2="160"/>
    <line x1="200" y1="0"   x2="200" y2="160"/>
    <line x1="300" y1="0"   x2="300" y2="160"/>
    <line x1="400" y1="0"   x2="400" y2="160"/>
    <line x1="500" y1="0"   x2="500" y2="160"/>
    <line x1="600" y1="0"   x2="600" y2="160"/>
    <line x1="700" y1="0"   x2="700" y2="160"/>
    <line x1="0"   y1="40"  x2="800" y2="40"/>
    <line x1="0"   y1="80"  x2="800" y2="80"/>
    <line x1="0"   y1="120" x2="800" y2="120"/>
  </g>

  <!-- Border glow lines -->
  <line x1="0" y1="1"   x2="800" y2="1"   stroke="url(#hfade)" stroke-width="1.5"/>
  <line x1="0" y1="159" x2="800" y2="159" stroke="url(#hfade)" stroke-width="1.5"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="160" rx="1.5" fill="#00FF41" filter="url(#deepglow)"/>

  <!-- Corner brackets -->
  <rect x="0"     y="0"     width="18"  height="1.5" fill="#00FF41" opacity="0.85" filter="url(#softglow)"/>
  <rect x="0"     y="0"     width="1.5" height="18"  fill="#00FF41" opacity="0.85" filter="url(#softglow)"/>
  <rect x="782"   y="0"     width="18"  height="1.5" fill="#00FF41" opacity="0.85" filter="url(#softglow)"/>
  <rect x="798.5" y="0"     width="1.5" height="18"  fill="#00FF41" opacity="0.85" filter="url(#softglow)"/>
  <rect x="0"     y="158.5" width="18"  height="1.5" fill="#00FF41" opacity="0.85" filter="url(#softglow)"/>
  <rect x="0"     y="142"   width="1.5" height="18"  fill="#00FF41" opacity="0.85" filter="url(#softglow)"/>
  <rect x="782"   y="158.5" width="18"  height="1.5" fill="#00FF41" opacity="0.85" filter="url(#softglow)"/>
  <rect x="798.5" y="142"   width="1.5" height="18"  fill="#00FF41" opacity="0.85" filter="url(#softglow)"/>

  <!-- Corner dots -->
  <circle cx="14"  cy="14"  r="2.5" fill="#00FF41" opacity="0.6" filter="url(#softglow)"/>
  <circle cx="786" cy="14"  r="2.5" fill="#00FF41" opacity="0.6" filter="url(#softglow)"/>
  <circle cx="14"  cy="146" r="2.5" fill="#00FF41" opacity="0.6" filter="url(#softglow)"/>
  <circle cx="786" cy="146" r="2.5" fill="#00FF41" opacity="0.6" filter="url(#softglow)"/>

  <!-- NEONWALK — shadow layer then bright -->
  <text x="32" y="83"
        font-family="'Courier New', Courier, monospace"
        font-size="50" font-weight="700" letter-spacing="8"
        fill="#003a0a" opacity="1">NEONWALK</text>
  <text x="32" y="83"
        font-family="'Courier New', Courier, monospace"
        font-size="50" font-weight="700" letter-spacing="8"
        fill="url(#titlefade)" filter="url(#dropshadow)">NEONWALK</text>

  <!-- Rule -->
  <rect x="32" y="92" width="280" height="1" fill="#00FF41" opacity="0.2"/>

  <!-- Subtitle -->
  <text x="34" y="113"
        font-family="'Courier New', Courier, monospace"
        font-size="11.5" letter-spacing="5"
        fill="#00FF41" opacity="0.45">3D CYBERPUNK PORTFOLIO</text>

  <!-- URL -->
  <text x="34" y="138"
        font-family="'Courier New', Courier, monospace"
        font-size="10.5" letter-spacing="2"
        fill="#00FF41" opacity="0.22">vittorialanzo.vercel.app</text>

  <!-- Visit CTA -->
  <text x="644" y="86"
        font-family="'Courier New', Courier, monospace"
        font-size="13" letter-spacing="2"
        fill="#00FF41" filter="url(#glow)">[ VISIT &#x2192; ]</text>
  <rect x="644" y="93" width="96" height="1" fill="#00FF41" opacity="0.12"/>
</svg>
