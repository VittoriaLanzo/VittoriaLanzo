<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="gv" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gvs" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gg" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="412" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#08082A"/>
    <stop offset="60%" stop-color="#050516"/>
    <stop offset="100%" stop-color="#030310"/>
  </linearGradient>
  <linearGradient id="fog" x1="0" y1="280" x2="0" y2="412" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#050512" stop-opacity="0"/>
    <stop offset="100%" stop-color="#030310" stop-opacity="0.75"/>
  </linearGradient>
  <radialGradient id="halo" cx="400" cy="210" r="180" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#6E6EFF" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#050512" stop-opacity="0"/>
  </radialGradient>
  <clipPath id="content"><rect y="38" width="800" height="412"/></clipPath>
</defs>

<!-- ── Window shell ── -->
<rect width="800" height="450" rx="10" fill="#0D0D1E"/>
<rect width="800" height="450" rx="10" fill="none" stroke="#2A2A3E" stroke-width="1"/>

<!-- ── Chrome bar ── -->
<rect width="800" height="38" rx="10" fill="#131326"/>
<rect y="28" width="800" height="10" fill="#131326"/>
<rect y="37" width="800" height="1" fill="#1E1E36"/>

<!-- Traffic lights -->
<circle cx="22" cy="19" r="5.5" fill="#FF5F57"/>
<circle cx="39" cy="19" r="5.5" fill="#FEBC2E"/>
<circle cx="56" cy="19" r="5.5" fill="#28C840"/>

<!-- URL bar -->
<rect x="82" y="7" width="636" height="24" rx="5" fill="#0A0A1C"/>
<rect x="82" y="7" width="636" height="24" rx="5" fill="none" stroke="#1E1E36" stroke-width="1"/>
<!-- Lock icon -->
<rect x="97" y="14" width="7" height="5" rx="1" fill="none" stroke="#44445A" stroke-width="1"/>
<path d="M99 14v-2a2 2 0 0 1 4 0v2" fill="none" stroke="#44445A" stroke-width="1"/>
<text x="400" y="23" font-family="monospace" font-size="11" fill="#555570" text-anchor="middle" letter-spacing="0.5">vittorialanzo.vercel.app</text>

<!-- ── Content area ── -->
<g clip-path="url(#content)">

<!-- Sky background -->
<rect y="38" width="800" height="412" fill="url(#sky)"/>

<!-- Scanlines -->
<rect y="38" width="800" height="412" fill="none"
  style="background-image:repeating-linear-gradient(0deg,rgba(0,0,0,.06) 0,rgba(0,0,0,.06) 1px,transparent 1px,transparent 3px)"/>

<!-- ── Far buildings (left) ── -->
<rect x="0"   y="160" width="58"  height="290" fill="#0A0A1C"/>
<rect x="58"  y="200" width="42"  height="250" fill="#080818"/>
<rect x="100" y="145" width="65"  height="305" fill="#0B0B1D"/>
<rect x="165" y="220" width="35"  height="230" fill="#07071A"/>
<!-- window lights left -->
<rect x="6"  y="175" width="9"  height="6" fill="#6E6EFF" opacity=".18"/>
<rect x="20" y="190" width="7"  height="5" fill="#6E6EFF" opacity=".12"/>
<rect x="8"  y="210" width="11" height="5" fill="#00FF88" opacity=".10"/>
<rect x="22" y="228" width="8"  height="4" fill="#6E6EFF" opacity=".15"/>
<rect x="6"  y="248" width="9"  height="5" fill="#00D4FF" opacity=".12"/>
<rect x="65" y="215" width="8"  height="5" fill="#6E6EFF" opacity=".14"/>
<rect x="78" y="235" width="9"  height="4" fill="#00FF88" opacity=".10"/>
<rect x="108" y="158" width="10" height="6" fill="#6E6EFF" opacity=".16"/>
<rect x="124" y="178" width="8"  height="5" fill="#00D4FF" opacity=".12"/>
<rect x="112" y="200" width="12" height="5" fill="#6E6EFF" opacity=".10"/>
<rect x="170" y="232" width="7"  height="4" fill="#FF2D78" opacity=".12"/>
<!-- neon bar tops left -->
<rect x="0"   y="160" width="58"  height="2" fill="#6E6EFF" opacity=".5" filter="url(#gvs)"/>
<rect x="100" y="145" width="65"  height="2" fill="#00D4FF" opacity=".4" filter="url(#gvs)"/>

<!-- ── Far buildings (right) ── -->
<rect x="742" y="155" width="58"  height="295" fill="#0A0A1C"/>
<rect x="700" y="185" width="42"  height="265" fill="#080818"/>
<rect x="635" y="150" width="65"  height="300" fill="#0B0B1D"/>
<rect x="600" y="215" width="38"  height="235" fill="#07071A"/>
<!-- window lights right -->
<rect x="748" y="170" width="9"  height="6"  fill="#00FF88" opacity=".18"/>
<rect x="762" y="192" width="7"  height="5"  fill="#6E6EFF" opacity=".14"/>
<rect x="750" y="215" width="11" height="5"  fill="#FF2D78" opacity=".10"/>
<rect x="706" y="200" width="8"  height="5"  fill="#6E6EFF" opacity=".14"/>
<rect x="720" y="222" width="9"  height="4"  fill="#00D4FF" opacity=".12"/>
<rect x="642" y="165" width="10" height="6"  fill="#6E6EFF" opacity=".16"/>
<rect x="656" y="188" width="8"  height="5"  fill="#00FF88" opacity=".12"/>
<rect x="605" y="228" width="8"  height="4"  fill="#6E6EFF" opacity=".10"/>
<!-- neon bar tops right -->
<rect x="742" y="155" width="58" height="2" fill="#00FF88" opacity=".5" filter="url(#gg)"/>
<rect x="635" y="150" width="65" height="2" fill="#FF2D78" opacity=".4" filter="url(#gvs)"/>

<!-- ── Cables ── -->
<path d="M0 90 Q200 110 400 105 Q600 100 800 88" stroke="#1A1A2E" stroke-width="1" fill="none" opacity=".8"/>
<path d="M0 78 Q300 95 800 74" stroke="#141428" stroke-width="0.8" fill="none" opacity=".6"/>

<!-- ── Rain ── -->
<line x1="190" y1="48" x2="186" y2="72"  stroke="#6E6EFF" stroke-width=".5" opacity=".12"/>
<line x1="250" y1="42" x2="246" y2="66"  stroke="#6E6EFF" stroke-width=".5" opacity=".10"/>
<line x1="310" y1="55" x2="306" y2="79"  stroke="#00D4FF" stroke-width=".5" opacity=".08"/>
<line x1="490" y1="48" x2="486" y2="72"  stroke="#6E6EFF" stroke-width=".5" opacity=".10"/>
<line x1="550" y1="38" x2="546" y2="62"  stroke="#6E6EFF" stroke-width=".5" opacity=".12"/>
<line x1="610" y1="52" x2="606" y2="76"  stroke="#00FF88" stroke-width=".5" opacity=".08"/>
<line x1="370" y1="44" x2="366" y2="68"  stroke="#6E6EFF" stroke-width=".4" opacity=".08"/>
<line x1="430" y1="58" x2="426" y2="82"  stroke="#6E6EFF" stroke-width=".4" opacity=".07"/>

<!-- ── Ambient halo behind hero ── -->
<rect y="38" width="800" height="412" fill="url(#halo)"/>

<!-- ── Hero text ── -->
<!-- Glow -->
<text x="400" y="210" font-family="Arial,sans-serif" font-weight="900" font-size="64"
      fill="#6E6EFF" text-anchor="middle" opacity=".22" filter="url(#gv)">VITTORIA LANZO</text>
<!-- Main -->
<text x="400" y="210" font-family="Arial,sans-serif" font-weight="900" font-size="64"
      fill="#F0F0F5" text-anchor="middle" letter-spacing="3">VITTORIA LANZO</text>

<!-- Divider -->
<line x1="290" y1="226" x2="510" y2="226" stroke="#6E6EFF" stroke-width=".8" opacity=".35"/>

<!-- Tagline -->
<text x="400" y="246" font-family="Arial,sans-serif" font-size="11"
      fill="#8888AA" text-anchor="middle" letter-spacing="3.5">ML RESEARCHER · AGENTIC ARCHITECT · PERFORMANCE ENGINEER</text>

<!-- ── Ground ── -->
<rect y="370" width="800" height="80" fill="#020210"/>
<rect y="368" width="800" height="2" fill="#0A0A1E"/>

<!-- Conduit lines -->
<rect y="370" x="0" width="800" height="1.2" fill="#6E6EFF" opacity=".55" filter="url(#gvs)"/>
<rect y="371.5" x="0" width="800" height=".6" fill="#6E6EFF" opacity=".2"/>
<rect y="370" x="760" width="40" height="1.2" fill="#00FF88" opacity=".55" filter="url(#gg)"/>
<rect y="370" x="0"  width="40" height="1.2" fill="#00FF88" opacity=".35"/>

<!-- Center dash marks -->
<rect y="370.4" x="345" width="22" height=".7" fill="#00D4FF" opacity=".55"/>
<rect y="370.4" x="389" width="22" height=".7" fill="#00D4FF" opacity=".55"/>
<rect y="370.4" x="433" width="22" height=".7" fill="#00D4FF" opacity=".55"/>

<!-- Fog overlay -->
<rect y="290" width="800" height="160" fill="url(#fog)"/>

<!-- ── Scroll hint ── -->
<text x="400" y="345" font-family="Arial,sans-serif" font-size="9"
      fill="#6E6EFF" text-anchor="middle" letter-spacing="4" opacity=".55">SCROLL TO EXPLORE</text>
<line x1="400" y1="350" x2="400" y2="360" stroke="#6E6EFF" stroke-width=".8" opacity=".4"/>

</g>

<!-- ── Corner marks (outside clip, on frame) ── -->
<line x1="12" y1="44" x2="28" y2="44" stroke="#6E6EFF" stroke-width=".8" opacity=".4"/>
<line x1="12" y1="44" x2="12" y2="60" stroke="#6E6EFF" stroke-width=".8" opacity=".4"/>
<line x1="788" y1="44" x2="772" y2="44" stroke="#6E6EFF" stroke-width=".8" opacity=".4"/>
<line x1="788" y1="44" x2="788" y2="60" stroke="#6E6EFF" stroke-width=".8" opacity=".4"/>
<line x1="12" y1="438" x2="28" y2="438" stroke="#6E6EFF" stroke-width=".8" opacity=".25"/>
<line x1="12" y1="422" x2="12" y2="438" stroke="#6E6EFF" stroke-width=".8" opacity=".25"/>
<line x1="788" y1="438" x2="772" y2="438" stroke="#6E6EFF" stroke-width=".8" opacity=".25"/>
<line x1="788" y1="422" x2="788" y2="438" stroke="#6E6EFF" stroke-width=".8" opacity=".25"/>
</svg>
